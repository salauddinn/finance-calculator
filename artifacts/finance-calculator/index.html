<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />

    <!-- Primary meta -->
    <title>India Money Toolkit — Free Finance Calculators</title>
    <meta name="description" content="Free calculators for EMI, SIP, FD, emergency fund, credit card payoff, and rent vs buy — built for Indian rupees. No login, no data sent anywhere." />
    <meta name="theme-color" content="#f6f8fa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph (WhatsApp, LinkedIn, Telegram) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="India Money Toolkit" />
    <meta property="og:title" content="India Money Toolkit — Free Finance Calculators" />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="EMI, SIP, FD, emergency fund, credit card payoff & rent vs buy — built for India. No login." />

    <!-- Icons & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
