kind = "web"
previewPath = "/"
title = "Finance Calculator India"
version = "1.0.0"
id = "artifacts/finance-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23220

[services.development]
run = "pnpm --filter @workspace/finance-calculator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finance-calculator", "run", "build" ]
publicDir = "artifacts/finance-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23220"
BASE_PATH = "/"
